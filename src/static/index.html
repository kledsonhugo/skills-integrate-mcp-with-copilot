<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <div class="title-section">
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>
        <div class="user-section">
          <div id="user-info" class="user-info hidden">
            <span id="teacher-name"></span>
            <button id="logout-btn" class="logout-btn">Logout</button>
          </div>
          <button id="user-icon" class="user-icon" title="Teacher Login">👤</button>
      <div class="mascot-left">
        <div class="css-octocat professor">
          <div class="octo-head"></div>
          <div class="octo-tentacles"></div>
          <div class="hat"></div>
        </div>
      </div>
      <div class="header-content">
        <h1>Mergington High School</h1>
        <h2>Extracurricular Activities</h2>
      </div>
      <div class="mascot-right">
        <div class="css-octocat grace">
          <div class="octo-head"></div>
          <div class="octo-tentacles"></div>
          <div class="bow"></div>
        </div>
      </div>
    </header>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Teacher Login</h3>
          <button class="close-btn" id="close-modal">&times;</button>
        </div>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required />
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />
          </div>
          <button type="submit">Login</button>
        </form>
        <div id="login-message" class="hidden"></div>
      </div>
    </div>

    <main>
      <div id="message" class="hidden"></div>
      
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <div class="css-octocat sports">
          <div class="octo-head"></div>
          <div class="octo-tentacles"></div>
          <div class="sports-cap"></div>
        </div>
        <p>&copy; 2023 Mergington High School</p>
        <div class="css-octocat artist">
          <div class="octo-head"></div>
          <div class="octo-tentacles"></div>
          <div class="paintbrush"></div>
        </div>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
